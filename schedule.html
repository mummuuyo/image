<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 텍스트 생성기</title>
</head>
<body>

<input type="text" id="textInput" placeholder="텍스트 입력">
<button onclick="generateImage()">이미지 생성</button>
<a id="download" download="result.png">다운로드</a>

<br><br>

<canvas id="canvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const bg = new Image();
bg.src = "background.jpg"; // 배경 이미지

bg.onload = () => {
  ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
};

function generateImage() {
  // 배경 다시 그리기
  ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  const text = document.getElementById("textInput").value;

  // 텍스트 스타일
  ctx.font = "30px Arial";
  ctx.fillStyle = "white";

  // 🔥 여기서 위치 고정
  ctx.fillText(text, 100, 200);

  // 다운로드 링크 생성
  const link = document.getElementById("download");
  link.href = canvas.toDataURL();
}
</script>

</body>
</html>
