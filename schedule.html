<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 텍스트 합성기</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        #capture-area {
            position: relative;
            display: inline-block;
            width: 500px; /* 배경 이미지 크기에 맞게 조절 */
            height: 500px;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-input {
            position: absolute;
            background: rgba(255, 255, 255, 0.5); /* 입력창 배경 (투명도) */
            border: 1px dashed #333;
            font-size: 20px;
            color: #000;
            padding: 5px;
        }

        /* 텍스트 박스 위치 조정 예시 */
        #box1 { top: 50px; left: 50px; }
        #box2 { bottom: 50px; right: 50px; }

        .btn-container { margin-top: 20px; }
    </style>
</head>
<body>

    <div id="capture-area">
        <img src="https://via.placeholder.com/500" class="background-img" crossorigin="anonymous">
        
        <input type="text" id="box1" class="text-input" placeholder="이름 입력">
        <input type="text" id="box2" class="text-input" placeholder="내용 입력">
    </div>

    <div class="btn-container">
        <button onclick="saveImage()">이미지로 저장하기</button>
    </div>

    <script>
        function saveImage() {
            const area = document.getElementById('capture-area');
            
            // 입력창의 테두리를 저장 직전에 잠시 없애 깔끔하게 만듭니다.
            const inputs = document.querySelectorAll('.text-input');
            inputs.forEach(input => input.style.border = 'none');

            html2canvas(area, {
                useCORS: true, // 외부 이미지 허용
                backgroundColor: null
            }).then(canvas => {
                // 이미지를 데이터 URL로 변환
                const link = document.createElement('a');
                link.download = 'result-image.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // 저장이 끝난 후 테두리를 다시 살립니다.
                inputs.forEach(input => input.style.border = '1px dashed #333');
            });
        }
    </script>
</body>
</html>
